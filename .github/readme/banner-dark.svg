<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <!-- Deep background gradient: ink with a cool violet tint at the entry, cooler at exit -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#0d1322"/>
      <stop offset="1" stop-color="#0b0f1a"/>
    </linearGradient>

    <!-- Violet diffuse stream (entry) - wide and soft -->
    <linearGradient id="streamIn" x1="0" y1="0.5" x2="1" y2="0.5" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="0.75" stop-color="#8f6fff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a188ff" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Compression transition gradient: violet -> teal -> green, with hue shifts -->
    <linearGradient id="compress" x1="0" y1="0" x2="1" y2="0" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.35" stop-color="#6a7dff"/>
      <stop offset="0.6" stop-color="#4cc9b0"/>
      <stop offset="1" stop-color="#3ddc97"/>
    </linearGradient>

    <!-- Output beam - tight green -->
    <linearGradient id="beam" x1="0" y1="0.5" x2="1" y2="0.5" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#3ddc97" stop-opacity="0.0"/>
      <stop offset="0.2" stop-color="#3ddc97" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#6bf0b4" stop-opacity="1"/>
    </linearGradient>

    <!-- Aperture slate fill -->
    <linearGradient id="aperture" x1="0" y1="0" x2="0" y2="1" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#1a2236"/>
      <stop offset="0.5" stop-color="#202a42"/>
      <stop offset="1" stop-color="#141b2c"/>
    </linearGradient>

    <!-- Restrained glow for the green beam -->
    <filter id="beamGlow" color-interpolation-filters="linearRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for the diffuse entry stream -->
    <filter id="softBlur" color-interpolation-filters="linearRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <!-- Background mesh stroke gradient -->
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="0" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#1a2236" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#2b3450" stop-opacity="1"/>
      <stop offset="1" stop-color="#1a2236" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="900" height="260" fill="url(#bg)"/>

  <!-- Distant mesh: diagonal strokes at varied opacity -->
  <g stroke="url(#mesh)" stroke-width="1" fill="none">
    <line x1="-40" y1="40" x2="940" y2="10" opacity="0.08"/>
    <line x1="-40" y1="90" x2="940" y2="58" opacity="0.05"/>
    <line x1="-40" y1="140" x2="940" y2="108" opacity="0.09"/>
    <line x1="-40" y1="190" x2="940" y2="160" opacity="0.04"/>
    <line x1="-40" y1="230" x2="940" y2="208" opacity="0.07"/>
  </g>
  <!-- A few counter diagonals for irregularity -->
  <g stroke="#2b3450" stroke-width="1" fill="none" opacity="0.06">
    <line x1="360" y1="-20" x2="520" y2="280"/>
    <line x1="600" y1="-20" x2="720" y2="280"/>
  </g>

  <!-- Wide diffuse violet stream entering from the left -->
  <g filter="url(#softBlur)" opacity="0.9">
    <ellipse cx="460" cy="130" rx="240" ry="72" fill="url(#streamIn)"/>
  </g>

  <!-- Conduit core: a narrowing trapezoid carrying the compressed gradient -->
  <path d="M 340,92 L 860,124 L 860,136 L 340,168 Z" fill="url(#compress)" opacity="0.22"/>

  <!-- Aperture 1 (widest) -->
  <g transform="translate(400,130) rotate(-8)">
    <rect x="-14" y="-70" width="22" height="140" rx="2" fill="url(#aperture)" stroke="#2d3a5a" stroke-width="1"/>
    <rect x="-14" y="-70" width="22" height="6" fill="#7c5cff" opacity="0.35"/>
    <rect x="-14" y="64" width="22" height="6" fill="#7c5cff" opacity="0.35"/>
  </g>

  <!-- Aperture 2 -->
  <g transform="translate(520,130) rotate(6)">
    <rect x="-12" y="-54" width="20" height="108" rx="2" fill="url(#aperture)" stroke="#34406a" stroke-width="1"/>
    <rect x="-12" y="-54" width="20" height="5" fill="#8a73ff" opacity="0.45"/>
    <rect x="-12" y="49" width="20" height="5" fill="#8a73ff" opacity="0.45"/>
  </g>

  <!-- Aperture 3 -->
  <g transform="translate(640,130) rotate(-5)">
    <rect x="-10" y="-38" width="18" height="76" rx="2" fill="url(#aperture)" stroke="#3c4a78" stroke-width="1"/>
    <rect x="-10" y="-38" width="18" height="4" fill="#5dd3b3" opacity="0.55"/>
    <rect x="-10" y="34" width="18" height="4" fill="#5dd3b3" opacity="0.55"/>
  </g>

  <!-- Aperture 4 (tightest) -->
  <g transform="translate(740,130) rotate(4)">
    <rect x="-8" y="-22" width="16" height="44" rx="2" fill="url(#aperture)" stroke="#3f5376" stroke-width="1"/>
    <rect x="-8" y="-22" width="16" height="3" fill="#3ddc97" opacity="0.8"/>
    <rect x="-8" y="19" width="16" height="3" fill="#3ddc97" opacity="0.8"/>
  </g>

  <!-- Output crystalline beam -->
  <g filter="url(#beamGlow)">
    <path d="M 750,128 L 860,125 L 860,135 L 750,132 Z" fill="url(#beam)"/>
  </g>
  <!-- Tiny crystalline facets at exit -->
  <g fill="#3ddc97" opacity="0.95">
    <polygon points="852,118 866,130 852,142 844,130"/>
  </g>
  <g fill="#6bf0b4" opacity="0.8">
    <polygon points="838,124 846,130 838,136 832,130"/>
  </g>

  <!-- "cf" wordmark -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <text x="80" y="147" font-size="96" font-weight="700" fill="#e8e9f3" letter-spacing="-4">cf</text>
    <text x="82" y="180" font-size="14" font-weight="400" fill="#9aa0b8" letter-spacing="2.4">the confluence cli that speaks json</text>
  </g>

  <!-- Subtle tick marks near the output, hinting at "determinism" -->
  <g stroke="#3ddc97" stroke-width="1" opacity="0.45">
    <line x1="710" y1="98" x2="720" y2="98"/>
    <line x1="722" y1="98" x2="736" y2="98"/>
    <line x1="710" y1="164" x2="728" y2="164"/>
    <line x1="732" y1="164" x2="742" y2="164"/>
  </g>
</svg>
