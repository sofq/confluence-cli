<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 12" width="900" height="12">
  <defs>
    <linearGradient id="seg" x1="320" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#7c5cff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#5fb6c8" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#3ddc97" stop-opacity="1"/>
      <stop offset="1" stop-color="#3ddc97" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Slate baseline running full width -->
  <line x1="0" y1="6" x2="900" y2="6" stroke="#1a2236" stroke-width="1" opacity="0.35"/>
  <!-- Bright violet→green segment, asymmetric (offset right of center) -->
  <line x1="320" y1="6" x2="720" y2="6" stroke="url(#seg)" stroke-width="2.5"/>
</svg>
