<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#5fb6c8"/>
      <stop offset="1" stop-color="#3ddc97"/>
    </linearGradient>
    <linearGradient id="lgFade" x1="10" y1="0" x2="26" y2="0" gradientUnits="userSpaceOnUse" color-interpolation="linearRGB">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3ddc97" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- The 'c' — an open arc representing the wide intake -->
  <path d="M 36 14
           A 18 18 0 1 0 36 50"
        fill="none"
        stroke="url(#lg)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- The 'f' — a tight vertical stroke + crossbar, the compressed output -->
  <line x1="46" y1="10" x2="46" y2="56"
        stroke="url(#lg)"
        stroke-width="6"
        stroke-linecap="round"/>
  <line x1="38" y1="28" x2="54" y2="28"
        stroke="url(#lg)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- A tiny narrowing accent below, echoing the banner apertures -->
  <line x1="12" y1="56" x2="22" y2="56"
        stroke="url(#lgFade)"
        stroke-width="2"
        stroke-linecap="round"/>
</svg>
